# Wuthering Waves theme — dark navy + cyan + subtle pink
# Transparency: adjust with CTRL+SHIFT+A M (increase) / CTRL+SHIFT+A L (decrease)

font_family      FantasqueSansM Nerd Font
font_size        13.0

background_opacity 0.82
dynamic_background_opacity yes

# Colors
background            #060c18
foreground            #b0ccd8
cursor                #00d4ff
cursor_text_color     #060c18
selection_background  #1a3a4a
selection_foreground  #e0f0ff

# Black
color0  #0e1e2e
color8  #1e3040

# Red
color1  #ff5555
color9  #ff6e6e

# Green
color2  #00e676
color10 #69ff94

# Yellow
color3  #c8a84b
color11 #ffd740

# Blue
color4  #4fc3f7
color12 #82d9ff

# Pink (magenta)
color5  #f4a0b8
color13 #f8c0d0

# Cyan
color6  #00d4ff
color14 #4de8ff

# White
color7  #b0ccd8
color15 #e0f0ff

# Window
window_padding_width 10
hide_window_decorations yes
