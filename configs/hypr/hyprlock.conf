general {
    disable_loading_bar = true
    hide_cursor = true
    grace = 0
}

background {
    monitor =
    path = /home/marko/Pictures/wallpapers/ww-552.jpg
    blur_passes = 0
    brightness = 0.5
    contrast = 0.9
}

# Clock
label {
    monitor =
    text = $TIME
    color = rgba(c8e8ffee)
    font_size = 100
    font_family = FantasqueSansM Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B %Y"
    color = rgba(f4a0b8cc)
    font_size = 26
    font_family = FantasqueSansM Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

# Input field
input-field {
    monitor =
    size = 280, 48
    outline_thickness = 2
    dots_size = 0.28
    dots_spacing = 0.18
    outer_color = rgba(c8e8ffaa)
    inner_color = rgba(04081499)
    font_color = rgba(c8e8ffff)
    fade_on_empty = true
    placeholder_text = <i>password</i>
    hide_input = false
    check_color = rgba(00d4ffcc)
    fail_color = rgba(ff444499)
    fail_text = <i>wrong password</i>
    capslock_color = rgba(c8a84bcc)
    position = 0, -60
    halign = center
    valign = center
    rounding = 4
}
